<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shop MVP</title>
    <link rel="stylesheet" href="/static/main.css">
</head>
<body>
    <header class="topbar">
        <div>
            <p class="eyebrow">Shop API</p>
            <h1>pepe
            </h1>
        </div>
        <div class="user-box">
            <span id="userEmail">&#1043;&#1110;&#1089;&#1090;&#1100;</span>
            <button id="logoutBtn" class="ghost hidden" type="button">&#1042;&#1080;&#1081;&#1090;&#1080;</button>
        </div>
    </header>

    <main class="layout">
        <aside class="sidebar">
            <section class="panel hidden" id="adminPanel">
                <h2>Admin</h2>
                <form id="productForm" class="form">
                    <label>
                        Name
                        <input id="productName" type="text" required>
                    </label>
                    <label>
                        Description
                        <textarea id="productDescription" rows="2" required></textarea>
                    </label>
                    <label>
                        Price
                        <input id="productPrice" type="number" min="1" step="0.01" required>
                    </label>
                    <label>
                        Category
                        <input id="productCategory" type="text" required>
                    </label>
                    <label>
                        Image URL
                        <input id="productImageUrl" type="url" required>
                    </label>
                    <label>
                        Stock
                        <input id="productStock" type="number" min="0" step="1" required>
                    </label>
                    <button type="submit">Create product</button>
                </form>
            </section>

            <section class="panel" id="authPanel">
                <div class="tabs" role="tablist">
                    <button class="tab active" id="loginTab" type="button">&#1042;&#1093;&#1110;&#1076;</button>
                    <button class="tab" id="registerTab" type="button">&#1056;&#1077;&#1108;&#1089;&#1090;&#1088;&#1072;&#1094;&#1110;&#1103;</button>
                </div>

                <form id="loginForm" class="form">
                    <label>
                        Email
                        <input id="loginEmail" type="email" autocomplete="email" required>
                    </label>
                    <label>
                        &#1055;&#1072;&#1088;&#1086;&#1083;&#1100;
                        <input id="loginPassword" type="password" autocomplete="current-password" minlength="6" required>
                    </label>
                    <button type="submit">&#1059;&#1074;&#1110;&#1081;&#1090;&#1080;</button>
                </form>

                <form id="registerForm" class="form hidden">
                    <label>
                        Email
                        <input id="registerEmail" type="email" autocomplete="email" required>
                    </label>
                    <label>
                        &#1055;&#1072;&#1088;&#1086;&#1083;&#1100;
                        <input id="registerPassword" type="password" autocomplete="new-password" minlength="6" maxlength="32" required>
                    </label>
                    <button type="submit">&#1057;&#1090;&#1074;&#1086;&#1088;&#1080;&#1090;&#1080; &#1072;&#1082;&#1072;&#1091;&#1085;&#1090;</button>
                </form>
            </section>

            <section class="panel">
                <div class="section-title">
                    <h2>&#1050;&#1086;&#1096;&#1080;&#1082;</h2>
                    <button id="refreshCartBtn" class="ghost" type="button">&#1054;&#1085;&#1086;&#1074;&#1080;&#1090;&#1080;</button>
                </div>
                <div id="cartList" class="cart-list">
                    <p class="muted">&#1059;&#1074;&#1110;&#1081;&#1076;&#1110;&#1090;&#1100;, &#1097;&#1086;&#1073; &#1073;&#1072;&#1095;&#1080;&#1090;&#1080; &#1082;&#1086;&#1096;&#1080;&#1082;.</p>
                </div>
            </section>

            <section class="panel">
                <h2>&#1054;&#1092;&#1086;&#1088;&#1084;&#1083;&#1077;&#1085;&#1085;&#1103;</h2>
                <form id="orderForm" class="form">
                    <label>
                        &#1030;&#1084;'&#1103;
                        <input id="customerName" type="text" required>
                    </label>
                    <label>
                        &#1058;&#1077;&#1083;&#1077;&#1092;&#1086;&#1085;
                        <input id="customerPhone" type="tel" required>
                    </label>
                    <label>
                        &#1040;&#1076;&#1088;&#1077;&#1089;&#1072;
                        <textarea id="customerAddress" rows="3" required></textarea>
                    </label>
                    <button type="submit">&#1054;&#1092;&#1086;&#1088;&#1084;&#1080;&#1090;&#1080; &#1079;&#1072;&#1084;&#1086;&#1074;&#1083;&#1077;&#1085;&#1085;&#1103;</button>
                </form>
            </section>
        </aside>

        <section class="content">
            <div class="section-title">
                <div>
                    <p class="eyebrow">&#1050;&#1072;&#1090;&#1072;&#1083;&#1086;&#1075;</p>
                    <h2>&#1058;&#1086;&#1074;&#1072;&#1088;&#1080;</h2>
                </div>
                <button id="refreshProductsBtn" class="ghost" type="button">&#1054;&#1085;&#1086;&#1074;&#1080;&#1090;&#1080;</button>
            </div>
            <div id="message" class="message hidden"></div>
            <div id="productsGrid" class="products-grid"></div>

            <section class="admin-orders hidden" id="adminOrdersPanel">
                <div class="section-title">
                    <h2>Admin orders</h2>
                    <button id="refreshOrdersBtn" class="ghost" type="button">Refresh</button>
                </div>
                <div id="ordersList" class="orders-list"></div>
            </section>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
